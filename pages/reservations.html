<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Réservations - Suivi voyage Madagascar</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<main class="page">
  <section class="hero">
    <div class="eyebrow">Réservations</div>
    <h1>Mes réservations</h1>
    <p>Hébergements, voiture, contacts et numéros utiles regroupés sur une seule page.</p>
  </section>
  
<section class="nav-card">
   <div class="grid-3">
    <a data-nav class="nav-item" href="../index.html"><strong>Accueil</strong></a>
    <a data-nav class="nav-item" href="./convertisseur.html"><strong>Convertisseur</strong></a>
    <a data-nav class="nav-item" href="./depenses.html"><strong>Dépenses</strong></a>
    <a data-nav class="nav-item" href="./feuille-de-route.html"><strong>Feuille de route</strong></a>
    <a data-nav class="nav-item" href="./reservations.html"><strong>Réservations</strong></a>
    <a data-nav class="nav-item" href="./infos-utiles.html"><strong>Infos utiles</strong></a>
  </div>
</section>

  <section class="panel">
    <h2 class="section-title">Liste</h2>
    <div id="reservationsList" class="list"></div>
  </section>
  <div class="page-footer">Réservations • <span data-current-year></span></div>
</main>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const container = document.getElementById('reservationsList');
  const res = await fetch('../assets/data/reservations.json');
  const data = await res.json();
  container.innerHTML = data.map(item => `
    <article class="item">
      <div class="badge badge-upcoming">${item.type}</div>
      <h3>${item.nom}</h3>
      <p><strong>Date :</strong> ${new Date(item.date + 'T00:00:00').toLocaleDateString('fr-FR')}</p>
      <p><strong>Lieu :</strong> ${item.lieu || '—'}</p>
      <p><strong>Contact :</strong> ${item.contact || '—'}</p>
      <p><strong>Réservation :</strong> ${item.reservation || '—'}</p>
      <p><strong>Notes :</strong> ${item.notes || '—'}</p>
    </article>
  `).join('');
});
</script>

<script src="../assets/js/app.js"></script>
</body>
</html>
