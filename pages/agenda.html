<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agenda</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #111111;
      --panel-2: #1a1a1a;
      --border: #0f2f52;
      --border-2: #20486f;
      --text: #ffffff;
      --muted: #c9d1d9;
      --soft: #8b949e;
      --accent: #153a63;
      --accent-2: #1d4f86;
      --today: #0c2238;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
      --radius: 14px;
      --radius-sm: 10px;
      --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --month-cell-height: 125px;
      --week-cell-height: 72px;
      --day-cell-height: 68vh;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
    }

    body {
      padding: 10px;
    }

    .app {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .shell {
      background: linear-gradient(180deg, rgba(17, 17, 17, 0.98), rgba(10, 10, 10, 0.98));
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(14, 30, 49, 0.95), rgba(10, 16, 24, 0.95));
    }

    .title-wrap {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.1rem, 2.8vw, 1.7rem);
      line-height: 1.1;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions,
    .nav-group,
    .view-group {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .actions {
      justify-content: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid var(--border-2);
      background: linear-gradient(180deg, #18232f, #111821);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 40px;
      transition: 0.15s ease;
      white-space: nowrap;
    }

    button:hover,
    button.active {
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      border-color: #356caa;
      transform: translateY(-1px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 10, 10, 0.9);
      align-items: center;
    }

    .range-label {
      text-align: center;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      padding: 0 6px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .calendar {
      padding: 8px;
      overflow-x: auto;
    }

    .grid,
    .month-header,
    .week-header,
    .day-view {
      display: grid;
      gap: 6px;
    }

    .month-header,
    .month-grid {
      grid-template-columns: repeat(7, minmax(130px, 1fr));
      min-width: 910px;
    }

    .week-header,
    .week-grid {
      grid-template-columns: 60px repeat(7, minmax(120px, 1fr));
      min-width: 960px;
    }

    .weekday,
    .hour,
    .day-col-title,
    .day-title {
      background: #0b1117;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      text-align: center;
      font-weight: 700;
      padding: 8px 4px;
      font-size: 0.82rem;
    }

    .month-cell,
    .week-cell,
    .day-cell {
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .month-cell {
      height: var(--month-cell-height);
      min-height: var(--month-cell-height);
      padding: 6px;
    }

    .week-cell {
      height: var(--week-cell-height);
      min-height: var(--week-cell-height);
      padding: 5px;
    }

    .day-cell {
      height: var(--day-cell-height);
      min-height: var(--day-cell-height);
      padding: 10px;
    }

    .month-cell.outside {
      opacity: 0.38;
    }

    .month-cell.today,
    .week-cell.today,
    .day-cell.today,
    .day-title.today {
      background: linear-gradient(180deg, var(--today), #132235);
      border-color: #356caa;
    }

    .date-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 4px;
    }

    .date-num {
      font-size: 0.83rem;
      font-weight: 800;
      color: var(--text);
    }

    .badge {
      font-size: 0.68rem;
      padding: 3px 6px;
      border-radius: 999px;
      background: rgba(32, 72, 111, 0.35);
      border: 1px solid rgba(88, 142, 200, 0.3);
      color: #dbeafe;
      flex-shrink: 0;
    }

    .content {
      flex: 1;
      min-height: 0;
      width: 100%;
      outline: none;
      font-size: 0.77rem;
      line-height: 1.25;
      color: var(--text);
      overflow: auto;
      border-radius: 8px;
      padding: 3px;
      white-space: normal;
      word-break: break-word;
    }

    .content:focus {
      background: rgba(255, 255, 255, 0.03);
      box-shadow: inset 0 0 0 1px rgba(87, 153, 239, 0.35);
    }

    .event,
    .compact-entry {
      display: block;
      background: rgba(20, 58, 99, 0.28);
      border: 1px solid rgba(63, 113, 165, 0.45);
      border-left: 4px solid #5aa2ff;
      border-radius: 8px;
      color: var(--text);
      word-break: break-word;
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .event {
      padding: 4px 6px;
    }

    .compact-entry {
      padding: 3px 5px;
      font-size: 0.7rem;
    }

    .hour {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      height: var(--week-cell-height);
      min-height: var(--week-cell-height);
      padding-top: 8px;
    }

    .day-card {
      display: grid;
      gap: 6px;
    }

    .day-title {
      text-align: left;
      padding: 10px 12px;
      font-size: 0.95rem;
      color: var(--text);
      background: linear-gradient(180deg, #0d1823, #09121a);
    }

    .hint {
      padding: 0 12px 10px;
      color: var(--soft);
      font-size: 0.74rem;
    }

    .footer-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 10px 12px;
      color: var(--soft);
      font-size: 0.72rem;
      border-top: 1px solid rgba(15, 47, 82, 0.55);
      flex-wrap: wrap;
    }

    @media (max-width: 940px) {
      .toolbar {
        grid-template-columns: 1fr;
      }

      .range-label {
        order: -1;
        text-align: left;
        padding: 0;
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 6px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: flex-start;
      }

      button {
        padding: 7px 10px;
        min-height: 38px;
        font-size: 0.84rem;
      }

      .content {
        font-size: 0.73rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <div class="topbar">
        <div class="title-wrap">
          <h1>Agenda</h1>
          <div class="subtitle">Voyage Madagascar • juillet–août 2026 • vues Mois / Semaine / Jours</div>
        </div>
        <div class="actions">
          <button id="saveBtn" title="Enregistrer les modifications">Sauvegarder</button>
          <button id="resetBtn" title="Revenir au préremplissage initial">Réinitialiser</button>
        </div>
      </div>

      <div class="toolbar">
        <div class="nav-group">
          <button id="prevBtn">◀</button>
          <button id="todayBtn">Aujourd’hui</button>
          <button id="nextBtn">▶</button>
        </div>
        <div class="range-label" id="rangeLabel"></div>
        <div class="view-group">
          <button class="view-btn active" data-view="month">Mois</button>
          <button class="view-btn" data-view="week">Semaine</button>
          <button class="view-btn" data-view="day">Jours</button>
        </div>
      </div>

      <div class="calendar" id="calendar"></div>
      <div class="hint">Chaque cellule est modifiable. Les dimensions sont figées et le contenu défile dans la cellule.</div>
      <div class="footer-bar">
        <div>Design sombre optimisé mobile</div>
        <div>Mode édition directe : clique dans une case puis tape</div>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'agenda-madagascar-2026-v1';
    const TODAY = new Date();
    TODAY.setHours(12, 0, 0, 0);
    const START = new Date('2026-07-01T12:00:00');
    const END = new Date('2026-08-10T12:00:00');

    const monthNames = [
      'janvier', 'février', 'mars', 'avril', 'mai', 'juin',
      'juillet', 'août', 'septembre', 'octobre', 'novembre', 'décembre'
    ];
    const dayNames = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'];

    const intelligentPrefill = {
      '2026-07-09': [
        '✈️ Toulouse → Paris 07:00–08:30',
        '✈️ Paris → Antananarivo 10:35–21:20',
        '🛂 Immigration, visa, bagages, accueil famille',
        '🚐 Transfert hébergement',
        '🛏 Nuit chez Aurélien'
      ],
      '2026-07-10': [
        '😴 Journée calme & récupération',
        '🧳 Trier valises road trip / valises à laisser',
        '🎒 Préparer sacs enfants : jeux, audio, surprises',
        '🧭 Brief road trip avec Rina',
        '🚶 Courte promenade de quartier'
      ],
      '2026-07-11': [
        '🚙 Départ tôt Antananarivo → Antsirabe',
        '🛣 RN7, pauses régulières',
        '🛏 Lycée Picot de Clorivière'
      ],
      '2026-07-12': [
        '🎁 Artisanat : corne de zébu, mini voitures, pierres',
        '🌊 Lac Andraikiba',
        '🛍 Souvenirs ciblés famille',
        '🧒 Temps libre enfants'
      ],
      '2026-07-13': ['🚗 Antsirabe → Miandrivazo', '🛏 Hôtel Princesse Tsiribihina'],
      '2026-07-14': ['🌊 Miandrivazo → Morondava', '🛏 Select Hôtel Morondava'],
      '2026-07-15': ['🌅 Allée des Baobabs au coucher du soleil', '🏖 Temps plage & repos'],
      '2026-07-16': ['🐚 Morondava → Belo sur Mer', '🛏 ENTREMER – Belo sur Mer'],
      '2026-07-17': ['🌴 Belo sur Mer', '🏖 Baignade, plage, jeux enfants', '⛵ Voir les boutres en construction', '😌 Repos'],
      '2026-07-18': ['🌴 Belo sur Mer', '🏖 Baignade, plage, jeux enfants', '😌 Repos'],
      '2026-07-19': ['🚙 Belo → Miandrivazo', '🛏 Hôtel Princesse Tsiribihina'],
      '2026-07-20': ['🛣 Miandrivazo → Antsirabe', '🛏 Lycée Picot de Clorivière', '📌 Aurélien en congé à partir d’aujourd’hui'],
      '2026-07-21': ['🏙 Antsirabe → Antananarivo', '🏡 Installation villa familiale Iavoloha', '🛏 Appartement IIT 18D Mboohmanga'],
      '2026-07-22': ['🔑 Récupération AVIS Ivato à 08:00', '📷 Photos/vidéos complètes du véhicule', '📄 Vérification contrat & franchise', '🧘 OFF'],
      '2026-07-23': ['👨‍👩‍👧‍👦 Ankadivory – 3 familles'],
      '2026-07-24': ['🧘 OFF'],
      '2026-07-25': ['📍 Andohatapenaka + Antsahadita'],
      '2026-07-26': ['🍽 Grand déjeuner Alasora'],
      '2026-07-27': ['🧘 OFF'],
      '2026-07-28': ['❤️ Le Marais Restaurant – vous 4 seulement'],
      '2026-07-29': ['📍 Amboditsiry'],
      '2026-07-30': ['👑 Rova Ambohimanga'],
      '2026-07-31': ['🧘 OFF'],
      '2026-08-01': ['🌿 Ampefy'],
      '2026-08-02': ['🌿 Ampefy'],
      '2026-08-03': ['🧘 OFF'],
      '2026-08-04': ['🌳 Départ pour Andasibe', '🛏 Longoza Ecolodge'],
      '2026-08-05': ['🌳 Andasibe', '🦎 Nature / détente / famille'],
      '2026-08-06': ['🌳 Andasibe', '🛏 Longoza Ecolodge'],
      '2026-08-07': ['🧘 OFF'],
      '2026-08-08': ['👋 Derniers au revoir'],
      '2026-08-09': ['🚗 16:30 départ Iavoloha', '🚙 18:00 restitution AVIS Ivato', '🍽 18:45 dîner léger', '🛄 21:00 enregistrement', '👋 22:30 au revoir famille'],
      '2026-08-10': ['✈️ 00:25 TANA → Paris', '✈️ 12:10 Paris → Toulouse', '🏁 Arrivée Toulouse 13:35']
    };

    function clonePrefill() {
      return JSON.parse(JSON.stringify(intelligentPrefill));
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return clonePrefill();

      try {
        return { ...clonePrefill(), ...JSON.parse(raw) };
      } catch (error) {
        console.warn('Impossible de lire le stockage local, retour au préremplissage.', error);
        return clonePrefill();
      }
    }

    let agendaData = loadData();
    let currentDate = new Date('2026-07-01T12:00:00');
    let view = 'month';

    const calendar = document.getElementById('calendar');
    const rangeLabel = document.getElementById('rangeLabel');
    const viewButtons = document.querySelectorAll('.view-btn');

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(agendaData));
    }

    function formatKey(date) {
      return new Date(date.getTime() - date.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0, 10);
    }

    function isSameDay(a, b) {
      return a.getFullYear() === b.getFullYear()
        && a.getMonth() === b.getMonth()
        && a.getDate() === b.getDate();
    }

    function addDays(date, days) {
      const d = new Date(date);
      d.setDate(d.getDate() + days);
      return d;
    }

    function startOfWeek(date) {
      const d = new Date(date);
      const day = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - day);
      d.setHours(12, 0, 0, 0);
      return d;
    }

    function endOfWeek(date) {
      return addDays(startOfWeek(date), 6);
    }

    function monthLabel(date) {
      return `${monthNames[date.getMonth()]} ${date.getFullYear()}`;
    }

    function fullDateLabel(date) {
      const day = dayNames[(date.getDay() + 6) % 7];
      return `${day} ${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
    }

    function ensureArray(key) {
      if (!agendaData[key]) agendaData[key] = [];
      if (!Array.isArray(agendaData[key])) agendaData[key] = [String(agendaData[key])];
      return agendaData[key];
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function contentToHTML(items, compact = false) {
      if (!items || !items.length) return '';
      return items.map((item) => {
        const safe = escapeHtml(item);
        return compact
          ? `<div class="compact-entry">${safe}</div>`
          : `<div class="event">${safe}</div>`;
      }).join('');
    }

    function parseEditableContent(html) {
      const temp = document.createElement('div');
      temp.innerHTML = html;

      const blocks = [...temp.querySelectorAll('.event, .compact-entry')]
        .map((el) => (el.textContent || '').trim())
        .filter(Boolean);

      if (blocks.length) return blocks;

      return (temp.innerText || temp.textContent || '')
        .split('\n')
        .map((s) => s.trim())
        .filter(Boolean);
    }

    function normalizeEditableHTML(el, compact = false) {
      const text = (el.innerText || el.textContent || '').trim();
      if (!text) {
        el.innerHTML = '';
        return [];
      }

      const lines = text
        .split('\n')
        .map((s) => s.trim())
        .filter(Boolean);

      el.innerHTML = contentToHTML(lines, compact);
      return lines;
    }

    function render() {
      viewButtons.forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.view === view);
      });

      if (view === 'month') renderMonth();
      if (view === 'week') renderWeek();
      if (view === 'day') renderDay();

      bindEditable();
    }

    function renderMonth() {
      rangeLabel.textContent = monthLabel(currentDate);
      const first = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1, 12);
      const last = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0, 12);
      const start = startOfWeek(first);
      const end = endOfWeek(last);

      const header = `<div class="month-header">${dayNames.map((d) => `<div class="weekday">${d}</div>`).join('')}</div>`;
      let grid = '<div class="grid month-grid">';

      for (let d = new Date(start); d <= end; d = addDays(d, 1)) {
        const key = formatKey(d);
        const items = ensureArray(key);
        const outside = d.getMonth() !== currentDate.getMonth();
        const today = isSameDay(d, TODAY);
        const inTrip = d >= START && d <= END;

        grid += `
          <div class="month-cell ${outside ? 'outside' : ''} ${today ? 'today' : ''}" data-date="${key}">
            <div class="date-row">
              <div class="date-num">${d.getDate()}</div>
              ${inTrip ? '<div class="badge">voyage</div>' : ''}
            </div>
            <div class="content" contenteditable="true" spellcheck="false">${contentToHTML(items)}</div>
          </div>
        `;
      }

      grid += '</div>';
      calendar.innerHTML = header + grid;
    }

    function renderWeek() {
      const weekStart = startOfWeek(currentDate);
      const weekEnd = endOfWeek(currentDate);
      rangeLabel.textContent = `${fullDateLabel(weekStart)} → ${fullDateLabel(weekEnd)}`;

      const headerDays = [];
      for (let i = 0; i < 7; i += 1) {
        const d = addDays(weekStart, i);
        headerDays.push(`<div class="day-col-title">${dayNames[i]}<br>${d.getDate()}/${String(d.getMonth() + 1).padStart(2, '0')}</div>`);
      }

      const hourLabels = ['06h', '08h', '10h', '12h', '14h', '16h', '18h', '20h'];

      let html = `
        <div class="week-header">
          <div class="weekday">Heure</div>
          ${headerDays.join('')}
        </div>
        <div class="grid week-grid">
      `;

      hourLabels.forEach((hour, rowIndex) => {
        html += `<div class="hour">${hour}</div>`;

        for (let i = 0; i < 7; i += 1) {
          const d = addDays(weekStart, i);
          const key = formatKey(d);
          const items = ensureArray(key);
          const today = isSameDay(d, TODAY);
          const chunk = items.slice(rowIndex * 2, rowIndex * 2 + 2);

          html += `
            <div class="week-cell ${today ? 'today' : ''}" data-date="${key}">
              <div class="content" contenteditable="true" spellcheck="false">${contentToHTML(chunk, true)}</div>
            </div>
          `;
        }
      });

      html += '</div>';
      calendar.innerHTML = html;
    }

    function renderDay() {
      rangeLabel.textContent = fullDateLabel(currentDate);
      const days = [currentDate, addDays(currentDate, 1), addDays(currentDate, 2)];
      let html = '<div class="day-view">';

      days.forEach((d) => {
        const key = formatKey(d);
        const items = ensureArray(key);
        const today = isSameDay(d, TODAY);

        html += `
          <div class="day-card">
            <div class="day-title ${today ? 'today' : ''}">${fullDateLabel(d)}</div>
            <div class="day-cell ${today ? 'today' : ''}" data-date="${key}">
              <div class="content" contenteditable="true" spellcheck="false">${contentToHTML(items)}</div>
            </div>
          </div>
        `;
      });

      html += '</div>';
      calendar.innerHTML = html;
    }

    function placeCaretAtEnd(el) {
      const range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function bindEditable() {
      document.querySelectorAll('.content[contenteditable="true"]').forEach((el) => {
        el.addEventListener('focus', () => {
          const currentLines = parseEditableContent(el.innerHTML);
          el.innerText = currentLines.join('\n');
          requestAnimationFrame(() => placeCaretAtEnd(el));
        });

        el.addEventListener('blur', () => {
          const parent = el.closest('[data-date]');
          if (!parent) return;

          const key = parent.dataset.date;
          const compact = parent.classList.contains('week-cell');
          const lines = normalizeEditableHTML(el, compact);
          agendaData[key] = lines;
          saveData();
        });

        el.addEventListener('keydown', (e) => {
          if (e.key === 'Tab') {
            e.preventDefault();
            document.execCommand('insertText', false, '    ');
          }
        });
      });
    }

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (view === 'month') currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1, 12);
      if (view === 'week') currentDate = addDays(currentDate, -7);
      if (view === 'day') currentDate = addDays(currentDate, -3);
      render();
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      if (view === 'month') currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1, 12);
      if (view === 'week') currentDate = addDays(currentDate, 7);
      if (view === 'day') currentDate = addDays(currentDate, 3);
      render();
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      currentDate = new Date(TODAY);
      render();
    });

    viewButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        view = btn.dataset.view;
        render();
      });
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      saveData();
      alert('Agenda sauvegardé dans ce navigateur.');
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      const ok = confirm('Réinitialiser toutes les modifications ?');
      if (!ok) return;
      agendaData = clonePrefill();
      saveData();
      render();
    });

    function runSelfTests() {
      console.assert(
        JSON.stringify(parseEditableContent('<div class="event">A</div><div class="event">B</div>')) === JSON.stringify(['A', 'B']),
        'Test parseEditableContent échoué'
      );

      console.assert(
        JSON.stringify((() => {
          const el = document.createElement('div');
          el.innerText = 'Alpha\nBeta\n\nGamma';
          return normalizeEditableHTML(el, false);
        })()) === JSON.stringify(['Alpha', 'Beta', 'Gamma']),
        'Test normalizeEditableHTML échoué'
      );

      console.assert(formatKey(new Date('2026-07-09T12:00:00')) === '2026-07-09', 'Test formatKey échoué');
      console.assert(isSameDay(TODAY, new Date(TODAY)), 'Test isSameDay sur TODAY échoué');
      console.assert(monthLabel(new Date('2026-07-15T12:00:00')) === 'juillet 2026', 'Test monthLabel échoué');
      console.assert(fullDateLabel(new Date('2026-07-09T12:00:00')).includes('9 juillet 2026'), 'Test fullDateLabel échoué');
      console.assert(isSameDay(startOfWeek(new Date('2026-07-09T12:00:00')), new Date('2026-07-06T12:00:00')), 'Test startOfWeek échoué');
      console.assert(isSameDay(endOfWeek(new Date('2026-07-09T12:00:00')), new Date('2026-07-12T12:00:00')), 'Test endOfWeek échoué');
      console.assert(contentToHTML(['X'], true).includes('compact-entry'), 'Test contentToHTML compact échoué');
      console.assert(contentToHTML(['X'], false).includes('event'), 'Test contentToHTML standard échoué');
    }

    runSelfTests();
    render();
  </script>
</body>
</html>
