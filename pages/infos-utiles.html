<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infos utiles - Suivi voyage Madagascar</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>

<main class="page">
  <section class="hero">
    <div class="eyebrow">Infos utiles</div>
    <h1>Infos utiles</h1>
    <p>Rappels pratiques, règles véhicule, enfants et points à garder sous la main.</p>
  </section>
  
<section class="nav-card">
  <div class="grid-3">
    <a data-nav class="nav-item" href="../index.html"><strong>Accueil</strong></a>
    <a data-nav class="nav-item" href="./convertisseur.html"><strong>Convertisseur</strong></a>
    <a data-nav class="nav-item" href="./depenses.html"><strong>Dépenses</strong></a>
    <a data-nav class="nav-item" href="./feuille-de-route.html"><strong>Feuille de route</strong></a>
    <a data-nav class="nav-item" href="./reservations.html"><strong>Réservations</strong></a>
    <a data-nav class="nav-item" href="./infos-utiles.html"><strong>Infos utiles</strong></a>
  </div>
</section>

  <section class="panel">
    <div id="infosList" class="list"></div>
  </section>
  <div class="page-footer">Infos utiles • <span data-current-year></span></div>
</main>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const container = document.getElementById('infosList');
  const res = await fetch('../assets/data/infos-utiles.json');
  const data = await res.json();
  container.innerHTML = data.map(item => `
    <article class="item">
      <div class="badge badge-upcoming">${item.categorie}</div>
      <h3>${item.titre}</h3>
      <p>${item.contenu}</p>
    </article>
  `).join('');
});
</script>

<script src="../assets/js/app.js"></script>
</body>
</html>
