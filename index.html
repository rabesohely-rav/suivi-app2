<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil - Suivi voyage Madagascar</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>

/* ===============================
PALETTE COULEUR
=============================== */

:root {
  --bg-main: #0f0f10;
  --bg-panel: rgba(27, 28, 31, 0.85);
  --bg-card: rgba(35, 37, 42, 0.92);

  --border-main: #5a3e2b;
  --border-soft: rgba(255,255,255,0.08);
}

/* ===============================
FOND AVEC IMAGE
=============================== */

body {

  margin: 0;
  font-family: Arial, sans-serif;

  background-image:
    linear-gradient(
      rgba(0,0,0,0.55),
      rgba(0,0,0,0.65)
    ),
    url("./assets/img/soarano.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  /* dynamique desktop */

  background-attachment: fixed;

}

/* mobile stabilité */

@media (max-width: 768px) {

  body {
    background-attachment: scroll;
  }

}

/* ===============================
TOUTES LES POLICES EN BLANC
=============================== */

* {
  color: #ffffff !important;
}

/* ===============================
MISE EN PAGE
=============================== */

.page {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* ===============================
PANELS
=============================== */

.panel,
.summary-card,
.today-banner,
.hero {

  background: var(--bg-panel);

  border: 1px solid var(--border-soft);

  border-radius: 18px;

  padding: 18px;

  margin-bottom: 16px;

  backdrop-filter: blur(4px);

}

/* ===============================
GRILLES
=============================== */

.nav-grid {

  display: grid;

  grid-template-columns: repeat(2, 1fr);

  gap: 14px;

}

.grid-2 {

  display: grid;

  grid-template-columns: repeat(2, 1fr);

  gap: 16px;

}

.grid-3 {

  display: grid;

  grid-template-columns: repeat(3, 1fr);

  gap: 14px;

}

/* responsive */

@media (max-width: 900px) {

  .nav-grid,
  .grid-2,
  .grid-3 {

    grid-template-columns: 1fr;

  }

}

/* ===============================
BOUTONS NAVIGATION EN RELIEF
=============================== */

.nav-item {

  background: var(--bg-card);

  border: 2px solid var(--border-main);

  border-radius: 14px;

  padding: 16px;

  text-decoration: none;

  display: block;

  transition: all 0.15s ease;

  transform: translateY(-2px);

  box-shadow:

    0 8px 18px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.04);

}

/* hover */

.nav-item:hover {

  transform: translateY(-4px);

  box-shadow:

    0 12px 24px rgba(0,0,0,0.55);

}

/* pression tactile */

.nav-item:active {

  transform: translateY(1px);

  box-shadow:

    0 4px 10px rgba(0,0,0,0.35);

}

/* ===============================
FOOTER
=============================== */

.page-footer {

  text-align: center;

  padding: 20px;

  opacity: 0.7;

}

  </style>

</head>

<body>

<main class="page">

  <section class="hero">

    <h1>
      Tableau de bord du séjour
    </h1>

  </section>

  <section class="summary grid-3">
  </section>

  <section class="panel">

    <h2 class="section-title">
      Navigation
    </h2>

    <div class="nav-grid">

      <a class="nav-item" href="./pages/convertisseur.html">
        <strong>Convertisseur</strong>
      </a>

      <a class="nav-item" href="./pages/depenses.html">
        <strong>Ajouter / suivre les dépenses</strong>
      </a>

      <a class="nav-item" href="./pages/feuille-de-route.html">
        <strong>Feuille de route</strong>
      </a>

      <a class="nav-item" href="./pages/reservations.html">
        <strong>Mes réservations</strong>
      </a>

      <a class="nav-item" href="./pages/agenda.html">
        <strong>Agenda</strong>
      </a>

      <a class="nav-item" href="./pages/infos-utiles.html">
        <strong>Infos utiles</strong>
      </a>

    </div>

  </section>

  <section class="grid-2">

    <div class="panel">
    </div>

    <div class="panel">
    </div>

  </section>

</main>

<script src="assets/js/app.js"></script>

</body>
</html>
