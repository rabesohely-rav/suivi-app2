<!DOCTYPE html>
<html lang="fr">
<head>
 <meta charset="UTF-8" />

  <style>

/* ===============================
PALETTE COULEUR
=============================== */

:root {
  --bg-main: #0f0f10;
  --bg-panel: rgba(27, 28, 31, 0.85);
  --bg-card: rgba(35, 37, 42, 0.92);

  --border-main: #5a3e2b;
  --border-soft: rgba(255,255,255,0.08);
}

/* ===============================
FOND AVEC IMAGE
=============================== */

body {

  margin: 0;
  font-family: Arial, sans-serif;

  background-image:
    linear-gradient(
      rgba(0,0,0,0.55),
      rgba(0,0,0,0.65)
    ),
    url("./assets/img/soarano.jpg");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  /* dynamique desktop */

  background-attachment: fixed;

}

/* mobile stabilité */

@media (max-width: 768px) {

  body {
    background-attachment: scroll;
  }

}

/* ===============================
TOUTES LES POLICES EN BLANC
=============================== */

* {
  color: #ffffff !important;
}

/* ===============================
MISE EN PAGE
=============================== */

.page {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

/* ===============================
PANELS
=============================== */

.panel,
.summary-card,
.today-banner,
.hero {

  background: var(--bg-panel);

  border: 1px solid var(--border-soft);

  border-radius: 18px;

  padding: 18px;

  margin-bottom: 16px;

  backdrop-filter: blur(4px);

}

/* ===============================
GRILLES
=============================== */

.nav-grid {

  display: grid;

  grid-template-columns: repeat(2, 1fr);

  gap: 14px;

}

.grid-2 {

  display: grid;

  grid-template-columns: repeat(2, 1fr);

  gap: 16px;

}

.grid-3 {

  display: grid;

  grid-template-columns: repeat(3, 1fr);

  gap: 14px;

}

/* responsive */

@media (max-width: 900px) {

  .nav-grid,
  .grid-2,
  .grid-3 {

    grid-template-columns: 1fr;

  }

}

/* ===============================
BOUTONS NAVIGATION EN RELIEF
=============================== */

.nav-item {

  background: var(--bg-card);

  border: 2px solid var(--border-main);

  border-radius: 14px;

  padding: 16px;

  text-decoration: none;

  display: block;

  transition: all 0.15s ease;

  transform: translateY(-2px);

  box-shadow:

    0 8px 18px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.04);

}

/* hover */

.nav-item:hover {

  transform: translateY(-4px);

  box-shadow:

    0 12px 24px rgba(0,0,0,0.55);

}

/* pression tactile */

.nav-item:active {

  transform: translateY(1px);

  box-shadow:

    0 4px 10px rgba(0,0,0,0.35);

}

/* ===============================
FOOTER
=============================== */

.page-footer {

  text-align: center;

  padding: 20px;

  opacity: 0.7;

}

/* ===============================
BLOC DATE & MÉTÉO LOCALE
=============================== */

.local-weather-wrap {
  display: flex;
  justify-content: center;
  margin-top: 18px;
}

.local-weather-card {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 18px;
  padding: 18px 22px;
  text-align: center;
  min-width: 290px;
  max-width: 460px;
  width: 100%;
  box-shadow:
    0 10px 24px rgba(0,0,0,0.28),
    inset 0 1px 0 rgba(255,255,255,0.04);
  backdrop-filter: blur(8px);
}

.local-weather-date {
  font-size: 1.1rem;
  font-weight: 700;
  line-height: 1.25;
  margin-bottom: 6px;
}

.local-weather-city {
  font-size: 1rem;
  opacity: 0.9;
  margin-bottom: 10px;
}

.local-weather-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.local-weather-icon {
  font-size: 1.45rem;
  line-height: 1;
}

.local-weather-text {
  font-size: 1rem;
  line-height: 1.2;
}

.local-weather-minmax {
  font-size: 0.95rem;
  line-height: 1.2;
}

.local-weather-minmax .min-temp {
  color: #64b5f6 !important;
  font-weight: 700;
}

.local-weather-minmax .max-temp {
  color: #ffb74d !important;
  font-weight: 700;
}

@media (max-width: 480px) {
  .local-weather-card {
    min-width: auto;
    padding: 16px 14px;
  }

  .local-weather-date {
    font-size: 1rem;
  }

  .local-weather-city,
  .local-weather-text,
  .local-weather-minmax {
    font-size: 0.95rem;
  }
}

  </style>

</head>

<body>

<main class="page">

  <section class="hero">

    <h1>
      Carnet de voyage
    </h1>

    <div class="local-weather-wrap">
      <div class="local-weather-card">
        <div id="date" class="local-weather-date">Chargement...</div>
        <div id="city" class="local-weather-city"></div>

        <div class="local-weather-line">
          <span id="icon" class="local-weather-icon"></span>
          <span id="weather" class="local-weather-text"></span>
        </div>

        <div id="minmax" class="local-weather-minmax"></div>
      </div>
    </div>
 
  

  <section class="panel">

    <h2 class="section-title">
      Navigation
    </h2>

    <div class="nav-grid">

      <a class="nav-item" href="./pages/convertisseur.html">
        <strong>Convertisseur</strong>
      </a>

      <a class="nav-item" href="./pages/depenses.html">
        <strong>Ajouter / suivre les dépenses</strong>
      </a>

      <a class="nav-item" href="./pages/feuille-de-route.html">
        <strong>Feuille de route</strong>
      </a>

      <a class="nav-item" href="./pages/reservations.html">

      </a>

      <a class="nav-item" href="./pages/agenda.html">

      </a>

      <a class="nav-item" href="./pages/infos-utiles.html">
        <strong>Infos utiles</strong>
      </a>

    </div>

  </section>

   <section>
  <section class="grid-3">

    <div class="panel">
    </div>

    <div class="panel">
    </div>

  </section>

</main>

<script>
function formatDate() {
  const now = new Date();

  let text = now.toLocaleDateString("fr-FR", {
    weekday: "long",
    day: "numeric",
    month: "long"
  });

  text = text.charAt(0).toUpperCase() + text.slice(1);
  document.getElementById("date").textContent = text;
}

function weatherCodeToText(code) {
  const map = {
    0: "Ciel dégagé",
    1: "Principalement dégagé",
    2: "Partiellement nuageux",
    3: "Couvert",
    45: "Brouillard",
    48: "Brouillard givrant",
    51: "Bruine légère",
    53: "Bruine modérée",
    55: "Bruine dense",
    61: "Pluie faible",
    63: "Pluie modérée",
    65: "Pluie forte",
    71: "Neige faible",
    73: "Neige modérée",
    75: "Neige forte",
    80: "Averses faibles",
    81: "Averses modérées",
    82: "Averses fortes",
    95: "Orage"
  };

  return map[code] || "Météo inconnue";
}

function weatherIcon(code) {
  if (code === 0) return "☀️";
  if (code === 1 || code === 2) return "🌤️";
  if (code === 3) return "☁️";
  if (code === 45 || code === 48) return "🌫️";
  if ([51, 53, 55, 61, 63, 65, 80, 81, 82].includes(code)) return "🌧️";
  if ([71, 73, 75].includes(code)) return "❄️";
  if (code === 95) return "⛈️";
  return "🌤️";
}

function setWeatherFallback(messageCity = "Antananarivo", messageWeather = "Météo indisponible") {
  document.getElementById("city").textContent = messageCity;
  document.getElementById("weather").textContent = messageWeather;
  document.getElementById("icon").textContent = "🌤️";
  document.getElementById("minmax").textContent = "";
}

async function loadLocationName(lat, lon) {
  try {
    const response = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`
    );

    if (!response.ok) {
      throw new Error("Erreur géocodage");
    }

    const geoData = await response.json();

    const city =
      geoData.address.city ||
      geoData.address.town ||
      geoData.address.village ||
      geoData.address.municipality ||
      geoData.address.county ||
      "Lieu inconnu";

    document.getElementById("city").textContent = city;
  } catch {
    document.getElementById("city").textContent = "Localisation indisponible";
  }
}

async function loadWeather(lat, lon) {
  try {
    const response = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=temperature_2m_min,temperature_2m_max&timezone=auto`
    );

    if (!response.ok) {
      throw new Error("Erreur météo");
    }

    const data = await response.json();

    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    const min = Math.round(data.daily.temperature_2m_min[0]);
    const max = Math.round(data.daily.temperature_2m_max[0]);

    document.getElementById("icon").textContent = weatherIcon(code);
    document.getElementById("weather").textContent = `${temp}° ${weatherCodeToText(code)}`;
    document.getElementById("minmax").innerHTML =
      `Min : <span class="min-temp">${min}°</span> Max : <span class="max-temp">${max}°</span>`;
  } catch {
    document.getElementById("weather").textContent = "Météo indisponible";
    document.getElementById("icon").textContent = "";
    document.getElementById("minmax").textContent = "";
  }
}

async function initWeather(lat, lon) {
  await Promise.all([
    loadLocationName(lat, lon),
    loadWeather(lat, lon)
  ]);
}

formatDate();

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    (position) => {
      initWeather(position.coords.latitude, position.coords.longitude);
    },
    () => {
      initWeather(-18.8792, 47.5079);
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 600000
    }
  );
} else {
  initWeather(-18.8792, 47.5079);
}
</script>

<script src="assets/js/app.js"></script>

</body>
</html>
