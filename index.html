<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accueil - Suivi voyage Madagascar</title>

  <link rel="stylesheet" href="assets/css/style.css" />

  <style>

:root {
  --bg-main: #0f0f10;
  --bg-panel: #1b1c1f;
  --bg-card: #23252a;

  --border-main: #5a3e2b;
  --border-soft: #2f3136;

  --btn-brown: #5a3e2b;
  --btn-blue: #16324f;

  --text-main: #ffffff;
  --text-soft: #c9cdd3;
}

body {
  background: var(--bg-main);
  color: var(--text-main);
}

.panel,
.summary-card,
.today-banner {
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
}

.nav-item {
  background: var(--bg-card);
  color: var(--text-main);

  border: 2px solid var(--border-main);

  border-radius: 14px;

  padding: 16px;

  text-decoration: none;

  display: block;

  transition: all 0.15s ease;

  box-shadow:
    0 6px 14px rgba(0,0,0,0.35);
}

/* relief principal */

.nav-item {

  transform: translateY(-2px);

  box-shadow:
    0 8px 18px rgba(0,0,0,0.45),
    0 0 0 1px rgba(255,255,255,0.04);

}

/* hover souris */

.nav-item:hover {

  transform: translateY(-4px);

  box-shadow:
    0 12px 24px rgba(0,0,0,0.55);

}

/* pression tactile */

.nav-item:active {

  transform: translateY(1px);

  box-shadow:
    0 4px 10px rgba(0,0,0,0.35);

}

/* texte */

h1,
h2,
h3,
strong {
  color: var(--text-main);
}

span,
p,
.note {
  color: var(--text-soft);
}

.page-footer {
  color: var(--text-soft);
}

  </style>

</head>
<body>

      <a class="nav-item" href="./pages/agenda.html">

      <a class="nav-item" href="./pages/infos-utiles.html">

  <section class="grid-2">
